# Application configuration for the Cash Flow Management dashboard project.
# Notes:
# - Use forward slashes for Windows paths to avoid escaping issues.
# - The default_base_dir is only the fallback location.
# - Base directory precedence should remain:
#   1) CLI argument (--base-dir)
#   2) Environment variable (CFM_BASE_DIR)
#   3) This config file
#   4) Hard-coded fallback in code

project:
  name: "Electricity Consumption and Prepayment Exploration Dashboard"
  short_name: "CashFlowMgmt Dashboard"
  owner: "Project stakeholders"
  environment: "local"

paths:
  default_base_dir: "F:/Secure/CashFlowMgmt"
  raw_data_subdir: "raw_data"
  processed_data_subdir: "data/processed"
  config_subdir: "config"
  src_subdir: "src"
  app_subdir: "app"

source_files:
  consumer_master:
    preferred_filenames:
      - "ConsumerMaster20260401.csv"
    patterns:
      - "ConsumerMaster*.csv"
  vend:
    preferred_filenames:
      - "VendData20260401.csv"
    patterns:
      - "VendData*.csv"
  consumption:
    preferred_filenames:
      - "ConsumptionData20260401.csv"
    patterns:
      - "ConsumptionData*.csv"

supported_file_patterns:
  consumer_master:
    - "ConsumerMaster*.csv"
  consumption:
    - "ConsumptionData*.csv"
  vend:
    - "VendData*.csv"

processed_outputs:
  consumer_master_parquet: "consumer_master.parquet"
  consumption_parquet: "consumption.parquet"
  vend_parquet: "vend.parquet"

display:
  app_title: "Electricity Consumption and Prepayment Exploration Dashboard"
  layout: "wide"
  sidebar_state: "expanded"
  page_names:
    overview: "Executive Overview"
    consumer_explorer: "Consumer Explorer"
    vend: "Vending Analysis"
    consumption: "Consumption Analysis"
    network: "Network / Spatial"
    data_quality: "Data Quality & Reconciliation"
  labels:
    consumption_kwh: "Total kWh Consumption"
    consumption_kvah: "Total kVAh Consumption"
    vend_amount: "Total Vend Amount"
    vend_count: "Vend Transaction Count"
    avg_vend_amount: "Average Vend Amount"

data:
  expected_datasets:
    - "consumer_master"
    - "consumption"
    - "vend"
  known_limitations:
    - "Vend and consumption are not directly merged to each other. Both are reconciled against Consumer Master using normalized consumer number and meter number keys."
    - "Vend issuedate may still be incomplete, date-only, time-only, or mixed in future extracts, so calendar analysis remains quality-gated."
    - "Unmatched, duplicate-key, and conflicting-key records are surfaced in reconciliation outputs instead of being silently forced into one join path."
  join_keys:
    consumer_key: "consumernumber"
    meter_key: "meterno"
  date_parsing:
    consumer_master:
      meterinstallationdate:
        dayfirst: true
      balanceupdatedon:
        dayfirst: true
    consumption:
      source_column: "midnightdate"
      dayfirst: false
    vend:
      source_column: "issuedate"
      dayfirst: false
      treat_as_provisional: true
  risk_thresholds:
    low_balance: 100
    critical_balance: 50
    watch_balance: 250
    stale_balance_warning_days: 30
    high_average_daily_kwh: 20
    high_average_daily_kvah: 20
    max_map_points: 2000

quality_checks:
  enabled: true
  duplicate_policy:
    mode: "keep_all" # keep_all | drop_first | drop_last | error
  basic_checks:
    missing_values: true
    duplicate_rows: true
    schema_validation: true
    date_parse_success: true
    numeric_type_checks: true
    negative_value_flags: true
    outlier_indicators: true
    source_file_diagnostics: true
  thresholds:
    outlier_iqr_multiplier: 1.5
    temporal_max_future_days: 0
    stale_data_warning_days: 90
    vend_full_datetime_warning_pct: 70
  future_rules_placeholder:
    enable_custom_cleaning_rules: false
    enable_threshold_alerts: false
    enable_entity_resolution_checks: false

filters:
  defaults:
    max_table_rows: 1000
    enable_download_buttons: true
  dimension_columns:
    - "tariffcode"
    - "area_type"
    - "connection_type"
    - "accountingmode"
    - "feedercode"
    - "dtcode"
    - "substationname"
    - "metertype"
    - "supplyvoltage"
  future_placeholders:
    consumption_thresholds: {}
    vend_thresholds: {}
    anomaly_thresholds: {}

developer_notes:
  coding_principles:
    - "Do not fabricate a direct merge key between vend and consumption."
    - "Keep path resolution centralised in a reusable helper module."
    - "Keep data quality visible and prominent."
    - "Prefer modular functions over monolithic scripts."
    - "Preserve flexibility for future structural changes."
  future_backlog:
    - "Add interval consumption support."
    - "Add a validated bridge between external meter, service point, and internal account identifiers where required."
    - "Add linked cashflow vs consumption analysis with documented join-confidence tiers."
    - "Refine operational exception thresholds with stakeholder input."
