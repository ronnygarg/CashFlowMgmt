datasets:
  consumer_master:
    display_name: "Consumer Master"
    required_columns:
      - "consumername"
      - "consumernumber"
      - "meterno"
      - "tariffcode"
      - "accountingmode"
      - "connectionstatus"
      - "meterinstallationdate"
      - "meterbalance"
      - "balanceupdatedon"
      - "billingunit"
      - "connection_type"
      - "area_type"
    candidate_keys:
      - "consumernumber"
      - "meterno"
    numeric_columns:
      - "meterbalance"
      - "contract_demand"
      - "gis_latitude"
      - "gis_longitude"
    primary_date_column: "balanceupdatedon"
    source_file_column: "source_file"
    categorical_allow_lists: {}
    notes:
      - "Consumer Master is the primary reference table for customer context, balances, and reconciliation."
      - "Use normalized consumer number and meter number keys for matching; preserve raw source values for diagnostics."

  consumption:
    display_name: "Consumption"
    required_columns:
      - "consumernumber"
      - "meterno"
      - "midnightdate"
      - "kwh_abs"
      - "kvah_abs"
      - "kwh_consumption"
      - "kvah_consumption"
    candidate_keys:
      - "consumernumber"
      - "meterno"
    numeric_columns:
      - "kwh_abs"
      - "kvah_abs"
      - "kwh_consumption"
      - "kvah_consumption"
    primary_date_column: "midnightdate"
    source_file_column: "source_file"
    categorical_allow_lists: {}
    notes:
      - "Consumption should remain a standalone dataset until a valid bridge exists."
      - "Multiple future monthly consumption files should be supported without code restructuring."

  vend:
    display_name: "Vend / Recharge"
    required_columns:
      - "consumernumber"
      - "meterno"
      - "transactionamount"
      - "issuedate"
    candidate_keys:
      - "consumernumber"
      - "meterno"
    numeric_columns:
      - "transactionamount"
    primary_date_column: "issuedate"
    source_file_column: "source_file"
    categorical_allow_lists: {}
    notes:
      - "Issuedate parsing is provisional because source values may be full datetime, date only, time only, or mixed."
      - "Do not invent full datetimes when only a time value is supplied."

standardization:
  lowercase_columns: true
  snake_case_columns: true
  trim_whitespace: true

quality_defaults:
  outlier_method: "iqr"
  missing_threshold_warning_pct: 20
  duplicate_subset_strategy: "full_row_only"

future_combined_analysis:
  blocked_reason: "Vend and consumption should not be directly joined to each other. Both should be reconciled independently against Consumer Master using normalized consumer number and meter number keys, with confidence and ambiguity surfaced explicitly."
  desired_future_artifacts:
    - "Documented entity-resolution confidence framework"
    - "Validated bridge assets where external identifiers diverge"
    - "Temporal alignment rules for recharge exhaustion analysis"
    - "Validated linked analytics model"
